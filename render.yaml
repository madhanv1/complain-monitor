services:
  - type: web
    name: pbll-backend
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false # You will need to add your MongoDB connection string in the Render Dashboard
      - key: JWT_SECRET
        sync: false # You will need to add your JWT secret in the Render Dashboard
